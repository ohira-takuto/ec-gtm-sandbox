<div id="site-header"></div>

<main class="container section">
  <h1 class="page-title">カート</h1>
  <div id="cart-root"></div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var root = document.getElementById('cart-root');
  if (!root) return;

  var lines = window.Store.cartLines();

  // 空カート: view_cart は発火しない
  if (!lines.length) {
    root.innerHTML =
      '<p class="empty">カートに商品がありません。</p>' +
      '<p style="text-align:center;"><a class="btn btn--outline" href="index.html">買い物を続ける</a></p>';
    return;
  }

  // ---- レイアウト骨組みを描画 ----
  root.innerHTML =
    '<div class="cart-layout">' +
      '<div class="cart-list" id="cart-list"></div>' +
      '<aside class="summary">' +
        '<h3>注文サマリー</h3>' +
        '<div class="summary-row"><span>小計</span><span data-subtotal></span></div>' +
        '<div class="summary-row"><span>送料</span><span>無料</span></div>' +
        '<div class="summary-row summary-row--total"><span>合計</span><span data-total></span></div>' +
        '<a class="btn btn--dark btn--block" href="checkout.html">レジに進む</a>' +
      '</aside>' +
    '</div>';

  var listEl = document.getElementById('cart-list');

  // ---- カート行を描画 ----
  function renderRows() {
    lines = window.Store.cartLines();
    listEl.innerHTML = lines.map(function (l, i) {
      var p = l.product;
      var lineTotal = window.DATA.effectivePrice(p) * l.qty;
      return '' +
        '<div class="cart-row" data-row="' + i + '">' +
          window.App.thumb(p, l.color) +
          '<div>' +
            '<p class="cart-row__name">' + p.item_name + '</p>' +
            '<p class="cart-row__meta">' + l.color + ' / ' + l.size + '</p>' +
            '<div class="qty">' +
              '<button type="button" data-qty-minus aria-label="数量を減らす">-</button>' +
              '<input type="text" value="' + l.qty + '" readonly aria-label="数量">' +
              '<button type="button" data-qty-plus aria-label="数量を増やす">+</button>' +
            '</div>' +
          '</div>' +
          '<div class="cart-row__right">' +
            '<span class="price" data-line-price>' + window.App.yen(lineTotal) + '</span>' +
            '<button type="button" class="link-remove" data-remove>削除</button>' +
          '</div>' +
        '</div>';
    }).join('');
  }

  // ---- サマリー金額を更新（GA4イベントは出さない） ----
  function renderSummary() {
    var value = window.Store.cartValue();
    var yen = window.App.yen(value);
    root.querySelector('[data-subtotal]').textContent = yen;
    root.querySelector('[data-total]').textContent = yen;
  }

  // 行内の価格表示だけ更新（数量変更時）
  function refreshLinePrice(rowEl, line) {
    var priceEl = rowEl.querySelector('[data-line-price]');
    if (priceEl) {
      priceEl.textContent = window.App.yen(window.DATA.effectivePrice(line.product) * line.qty);
    }
  }

  renderRows();
  renderSummary();

  // 計測: カート表示（描画後に1回）
  window.DL.viewCart(window.Store.cartDLItems(), window.Store.cartValue());

  // ---- イベント委譲 ----
  listEl.addEventListener('click', function (e) {
    var rowEl = e.target.closest('.cart-row');
    if (!rowEl) return;
    var i = Number(rowEl.getAttribute('data-row'));

    // 削除
    if (e.target.closest('[data-remove]')) {
      var l = lines[i];
      var p = l.product;
      window.Store.removeItem(i);
      window.DL.removeFromCart(p, l.qty, l.color + ' / ' + l.size);

      var remaining = window.Store.cartLines();
      if (!remaining.length) {
        // 全削除後は空表示に切り替え（view_cart は再発火しない）
        root.innerHTML =
          '<p class="empty">カートに商品がありません。</p>' +
          '<p style="text-align:center;"><a class="btn btn--outline" href="index.html">買い物を続ける</a></p>';
      } else {
        renderRows();      // 再描画（view_cart は再発火しない）
        renderSummary();
      }
      window.App.updateCartCount();
      return;
    }

    // 数量 -（GA4イベントは出さない）
    if (e.target.closest('[data-qty-minus]')) {
      var newMinus = Math.max(1, lines[i].qty - 1);
      window.Store.updateQty(i, newMinus);
      lines = window.Store.cartLines();
      rowEl.querySelector('.qty input').value = lines[i].qty;
      refreshLinePrice(rowEl, lines[i]);
      renderSummary();
      return;
    }

    // 数量 +（GA4イベントは出さない）
    if (e.target.closest('[data-qty-plus]')) {
      var newPlus = lines[i].qty + 1;
      window.Store.updateQty(i, newPlus);
      lines = window.Store.cartLines();
      rowEl.querySelector('.qty input').value = lines[i].qty;
      refreshLinePrice(rowEl, lines[i]);
      renderSummary();
      return;
    }
  });
});
</script>

<div id="site-footer"></div>
<script src="assets/js/data.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/datalayer.js"></script>

</body>
</html>
