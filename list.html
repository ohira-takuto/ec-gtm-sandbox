<!-- ページ別ロジックはこの下に1つの<script>で書く -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  // 1) カテゴリの決定（無効/未指定は women を既定にする）
  var param = window.App.getParam('category');
  var meta = null;
  for (var i = 0; i < window.DATA.categories.length; i++) {
    if (window.DATA.categories[i].key === param) { meta = window.DATA.categories[i]; break; }
  }
  if (!meta) {
    for (var j = 0; j < window.DATA.categories.length; j++) {
      if (window.DATA.categories[j].key === 'women') { meta = window.DATA.categories[j]; break; }
    }
  }
  var key = meta.key;

  // 2) 該当カテゴリの商品を取得
  var items = window.DATA.getByCategory(key);

  // 3) パンくず / タイトル / 件数を埋める
  document.querySelector('[data-bc-category]').textContent = meta.name;
  document.querySelector('[data-page-title]').textContent = meta.name + ' ' + meta.jp;
  document.querySelector('[data-page-lead]').textContent = items.length + '件の商品';

  // 4) グリッド描画（view_item_list + 各カードに select_item を仕込む）
  window.App.renderProductGrid(
    document.getElementById('grid'),
    items,
    'category_' + key,
    meta.name + ' 一覧'
  );
});
</script>
</body>
