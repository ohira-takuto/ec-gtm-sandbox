<div id="site-header"></div>

<main class="container section">
  <div class="auth-narrow">
    <nav class="breadcrumb">
      <a href="index.html">HOME</a>
      <span>/</span>
      <a href="login.html">ログイン / 会員登録</a>
    </nav>

    <h1 class="page-title">ログイン / 会員登録</h1>
    <p class="page-lead">UNILO メンバーになると、注文履歴の確認や会員特典がご利用いただけます。</p>

    <div class="form-card" style="margin-top: var(--space-6);">
      <h3>ログイン / 新規会員登録</h3>

      <div class="field">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="field">
        <label for="name">お名前（任意）</label>
        <input type="text" id="name" placeholder="UNILO 太郎" autocomplete="name">
      </div>

      <div class="field">
        <label for="pw">パスワード</label>
        <input type="password" id="pw" placeholder="（デモのため任意）" autocomplete="current-password">
      </div>

      <button class="btn btn--dark btn--block" id="loginBtn">ログイン</button>
      <div style="height: var(--space-3);"></div>
      <button class="btn btn--outline btn--block" id="signupBtn">新規会員登録</button>

      <p class="note">デモのため、任意のメールでログインできます。会員ランクはメールから擬似的に割り当てられます。</p>
    </div>
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var emailEl = document.getElementById('email');
  var nameEl = document.getElementById('name');
  var loginBtn = document.getElementById('loginBtn');
  var signupBtn = document.getElementById('signupBtn');

  // メール必須チェック（空ならalertして中断）
  function getValidEmail() {
    var email = (emailEl.value || '').trim();
    if (!email) {
      alert('メールアドレスを入力してください。');
      emailEl.focus();
      return null;
    }
    return email;
  }

  // ログイン
  loginBtn.addEventListener('click', function () {
    var email = getValidEmail();
    if (!email) return;
    var name = (nameEl.value || '').trim();

    // Store.login が user_id / membership_rank（メールから擬似割当）を確定する [サーバー注入ポイントの代役]
    var u = window.Store.login(email, name);

    // 計測: 先に setUser で user_id / user_properties(membership_rank / login_state) を確定する。
    // 後続の login ヒットに会員ランクが乗るよう、イベントより前に流す。
    window.DL.setUser(u);
    // 計測: login イベント。送信完了(または保険のタイムアウト)後に遷移し、同期遷移による
    // GA4ヒットの消失を防ぐ。
    window.DL.login('password', function () { location.href = 'mypage.html'; });
  });

  // 新規会員登録
  signupBtn.addEventListener('click', function () {
    var email = getValidEmail();
    if (!email) return;
    var name = (nameEl.value || '').trim();

    // 登録もデモではログインと同じく Store.login でユーザーを確定する
    var u = window.Store.login(email, name);

    // 計測: 先に setUser、その後 sign_up を送信完了後に遷移する。
    window.DL.setUser(u);
    window.DL.signUp('password', function () { location.href = 'mypage.html'; });
  });
});
</script>

<div id="site-footer"></div>

</html>
