<main class="container section">
  <nav class="breadcrumb">
    <a href="index.html">HOME</a>

    <a href="mypage.html">マイページ</a>
  </nav>

  <h1 class="page-title">マイページ</h1>
  <p class="page-lead">会員情報のご確認ができます。</p>

  <div class="member-card" id="member-card"></div>

  <div class="qty-row">
    <button class="btn btn--outline" id="logout">ログアウト</button>
  </div>

  <p class="note">会員ID(user_id)と会員ランク(membership_rank)は、全ページで window.DL.setUser によりGA4のユーザープロパティとして送信されます。</p>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var u = window.Store.getUser();
  if (!u.logged_in) { location.replace('login.html'); return; }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  var card = document.getElementById('member-card');
  card.innerHTML = '' +
    '<div class="member-row"><span class="k">お名前</span><span>' + esc(u.name) + '</span></div>' +
    '<div class="member-row"><span class="k">メール</span><span>' + esc(u.email) + '</span></div>' +
    '<div class="member-row"><span class="k">会員ID</span><span>' + esc(u.user_id) + '</span></div>' +
    '<div class="member-row"><span class="k">会員ランク</span><span class="badge-rank">' + esc(u.membership_rank) + '</span></div>';

  document.getElementById('logout').addEventListener('click', function () {
    window.Store.logout();
    window.DL.setUser(window.Store.getUser());
    location.href = 'index.html';
  });
});
</script>
