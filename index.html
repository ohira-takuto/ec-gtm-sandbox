<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
<div id="site-header"></div>

<main>
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-copy">
        <h1>シンプルで上質な、毎日の服。</h1>
        <p>LifeWear。長く使える定番を、心地よい価格で。</p>
        <a class="btn btn--dark" href="list.html?category=women">新作を見る</a>
      </div>
      <div class="hero-visual">UNILO LifeWear</div>
    </div>
  </section>

  <div class="container section">
    <div class="category-tiles" id="category-tiles"></div>
  </div>

  <section class="container section">
    <h2 class="section-title">おすすめ</h2>
    <div id="featured-grid"></div>
  </section>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // page_view は GTM の GA4 設定タグが自動発火する想定のため、ここでは手動 push しない。

  // カテゴリタイル: sale を除く4カテゴリを描画
  var tiles = document.getElementById('category-tiles');
  if (tiles) {
    tiles.innerHTML = window.DATA.categories
      .filter(function (c) { return c.key !== 'sale'; })
      .map(function (c) {
        return '<a class="cat-tile" href="list.html?category=' + c.key + '">' +
          c.name + '<small>' + c.jp + '</small></a>';
      }).join('');
  }

  // おすすめグリッド: 描画と同時に view_item_list 発火 / select_item クリック計測を内部実施
  window.App.renderProductGrid(
    document.getElementById('featured-grid'),
    window.DATA.getFeatured(),
    'featured_top',
    'トップ おすすめ'
  );
});
</script>

<div id="site-footer"></div>
<script src="assets/js/data.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/datalayer.js"></script>
<script src="assets/js/common.js"></script>
<!-- ページ別ロジックはこの下に1つの<script>で書く -->
</body>
</html>
